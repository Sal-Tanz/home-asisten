    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="logo-icon"></div>
                <div class="header-title">
                    <h1>ElBot System</h1>
                    <p>AI Interface v4.0</p>
                </div>
            </div>
            <div class="status-badge" id="statusBadge">
                <div class="status-dot"></div>
                <span>Ready</span>
            </div>
            <div class="agent-badge" id="agentBadge">
                <span class="agent-icon"><svg class="icon" aria-hidden="true"><use href="#icon-bot"/></svg></span>
                <span class="agent-name" id="agentName">-</span>
            </div>
        </div>

        <!-- Chat Display -->
        <div class="chat-area" id="chatArea">
            <!-- Face Detection Indicator -->
            <div id="faceIndicator" class="face-indicator" style="display:none;">
                <span class="face-icon"><svg class="icon" aria-hidden="true"><use href="#icon-face"/></svg></span>
                <span id="faceName">Unknown</span>
                <span class="face-conf" id="faceConf"></span>
            </div>

            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon"><svg class="icon" style="font-size:80px;" aria-hidden="true"><use href="#icon-bolt"/></svg></div>
                <h2>ElBot Interface Active</h2>
                <p>Voice command system initialized. Press <strong>START RECORDING</strong> to begin interaction. System will auto-detect speech pauses and respond accordingly.</p>
                <p style="font-size:11px;color:var(--text-secondary);margin-top:8px;letter-spacing:1px;">⚠ COMPATIBLE WITH MODERN BROWSERS ONLY</p>
            </div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <!-- Control Bar -->
        <div class="control-bar">
            <button class="btn btn-record" id="recordBtn" onclick="toggleRecording()" title="Start Recording" aria-label="Start recording">
                <span id="recordBtnIcon"><svg class="icon" aria-hidden="true"><use href="#icon-mic"/></svg></span>
            </button>
            <button class="btn btn-icon tts-btn" id="ttsBtn" onclick="toggleTTS()" title="Audio Response" aria-label="Toggle audio response">
                <svg class="icon" aria-hidden="true"><use href="#icon-volume"/></svg>
            </button>
            <button class="btn btn-icon test-ai" onclick="testConnection()" title="Test Connection" aria-label="Test AI connection">
                <svg class="icon" aria-hidden="true"><use href="#icon-plug"/></svg> TEST
            </button>
            <button class="btn btn-icon" onclick="clearChat()" title="Clear chat" aria-label="Clear chat">
                <svg class="icon" aria-hidden="true"><use href="#icon-trash"/></svg>
            </button>
        </div>

        <div class="listening-bar" id="listeningBar"></div>
    </div>

    <!-- Thinking overlay -->
    <div class="thinking-overlay" id="thinkingOverlay">
        <div class="thinking-ring">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="center-icon"><svg class="icon" style="font-size:28px;" aria-hidden="true"><use href="#icon-bot"/></svg></div>
        </div>
        <div class="thinking-text" id="thinkingText">Sedang berpikir...</div>
        <button class="thinking-stop-btn" onclick="stopGeneration()">
            <svg class="icon" aria-hidden="true"><use href="#icon-stop"/></svg> Stop Generating
        </button>
    </div>

    <!-- Socket.IO Client -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        // Initialize Socket.IO
        const socket = io();
        let isRecording = false;
        let isAIResponding = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let audioContext = null;
        let analyser = null;
        let silenceTimer = null;
        let speechDetected = false;
        let segmentStartTime = 0;
        const SILENCE_THRESHOLD = -30; // dB threshold for silence
        const SILENCE_DURATION = 600; // ms of silence to trigger send (optimized: was 800ms)
        const MIN_SEGMENT_MS = 1500; // minimum recording segment to send (optimized: was 2000ms)

        // DOM Elements
        const chatArea = document.getElementById('chatArea');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const typingIndicator = document.getElementById('typingIndicator');
        const recordBtn = document.getElementById('recordBtn');
        const recordBtnIcon = document.getElementById('recordBtnIcon');
        const statusBadge = document.getElementById('statusBadge');
        const thinkingOverlay = document.getElementById('thinkingOverlay');
        const thinkingText = document.getElementById('thinkingText');
        const listeningBar = document.getElementById('listeningBar');
        let currentAIBubble = null;
        let ttsEnabled = true;
        let speechQueue = [];
        let isSpeaking = false;
        let fullAIResponse = '';
        let audioUnlocked = false;
        let currentAudio = null;
        let messageCount = 0;
        let thinkingTexts = [
            'Sedang berpikir...',
            'Menganalisis pertanyaan...',
            'Mencari jawaban terbaik...',
            'Memproses informasi...',
            'Menyusun respons...',
            'Hampir selesai...'
        ];
        let thinkingTextIdx = 0;
        let thinkingTextTimer = null;

        // Unlock HTML Audio playback on first user interaction (browser autoplay policy)
        function unlockAudio() {
            if (audioUnlocked) return;
            // Play silent audio to get audio context running (browser requirement)
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const buf = ctx.createBuffer(1, 1, 22050);
                const src = ctx.createBufferSource();
                src.buffer = buf;
                src.connect(ctx.destination);
                src.start(0);
                audioUnlocked = true;
                console.log('🔓 Audio unlocked');
                flushTtsQueue();
            } catch(e) {
                console.warn('AudioContext unlock failed, will retry on click');
            }
        }

        // Multiple unlock attempts for Brave compatibility
        document.addEventListener('click', unlockAudio, { once: false });
        document.addEventListener('touchstart', unlockAudio, { once: false });

        // Socket Events
        socket.on('connected', (data) => {
            console.log('Connected:', data.session_id);
            updateStatus('connected', 'Connected');
            // Auto-start recording after short delay
            setTimeout(() => {
                if (!isRecording) startRecording();
            }, 500);
            // Auto-unlock audio after page load (browser --autoplay-policy=no-user-gesture-required)
            setTimeout(unlockAudio, 1000);
        });

        socket.on('ai_status', (data) => {
            if (data.status === 'thinking') {
                isAIResponding = true;
                showTyping(true);
                showThinkingOverlay(true);
                lastToolBanner = null;
                updateStatus('thinking', 'AI is thinking...');
                recordBtn.disabled = true;
            } else if (data.status === 'completed') {
                isAIResponding = false;
                showTyping(false);
                showThinkingOverlay(false);
                finalizeAIBubble();
                lastToolBanner = null;
                updateStatus('connected', 'Ready');
                recordBtn.disabled = false;
                // Speak the response if TTS enabled
                if (ttsEnabled && fullAIResponse.trim()) {
                    console.log('🔊 Attempting TTS for response:', fullAIResponse.substring(0, 50) + '...');
                    console.log('🔊 TTS enabled:', ttsEnabled, 'Audio unlocked:', audioUnlocked);
                    console.log('🔊 Browser:', navigator.userAgent.includes('Chrome') ? 'Chromium-based' : 'Other');
                    speakText(fullAIResponse.trim());
                }
                fullAIResponse = '';
            } else if (data.status === 'error') {
                isAIResponding = false;
                showTyping(false);
                showThinkingOverlay(false);
                updateStatus('error', 'Error');
                recordBtn.disabled = false;
            } else if (data.status === 'stopped') {
                isAIResponding = false;
                showTyping(false);
                showThinkingOverlay(false);
                finalizeAIBubble();
                updateStatus('connected', 'Ready');
                recordBtn.disabled = false;
                showToast('Respons dihentikan', 'warning');
            }
        });

        socket.on('generation_stopped', () => {
            isAIResponding = false;
            showTyping(false);
            showThinkingOverlay(false);
            recordBtn.disabled = false;
        });

        socket.on('ai_chunk', (data) => {
            if (!currentAIBubble) {
                removeWelcome();
                currentAIBubble = createMessageBubble('ai');
                fullAIResponse = '';
            }
            fullAIResponse += data.chunk;
            appendToBubble(currentAIBubble, data.chunk);
            scrollToBottom();
        });

        socket.on('error', (data) => {
            showToast(data.message, 'error');
        });

        socket.on('history_cleared', () => {
            removeWelcome();
            currentAIBubble = null;
            showWelcome();
        });

        // Audio processing results from server
        socket.on('audio_status', (data) => {
            updateStatus('processing', 'Processing audio...');
        });

        socket.on('audio_result', (data) => {
            stopAudioPlayback();  // Stop AI voice when user starts new chat
            hideImageModal();
            const text = data.text;
            console.log('Server recognized:', text);
            addUserMessage(text);
            sendToAI(text);
            // Keep recording state — don't reset to Ready
            if (isRecording) {
                updateStatus('recording', 'Listening...');
            }
        });

        socket.on('audio_silence', () => {
            // Ignore silence silently to avoid UI spam
            console.log("Audio segment contained no speech.");
            if (isRecording) {
                updateStatus('recording', 'Listening...');
            } else {
                updateStatus('connected', 'Ready');
            }
        });

        socket.on('audio_error', (data) => {
            showToast(data.message, 'warning');
            if (isRecording) {
                updateStatus('recording', 'Listening...');
            } else {
                updateStatus('connected', 'Ready');
            }
        });

        socket.on('tool_executing', (data) => {
            console.log('Tool executing:', data.tool, data.input);
            // Finalize current AI bubble before showing tool banner
            if (currentAIBubble) {
                finalizeAIBubble();
            }
            addToolBanner(data.tool, data.input, null);
        });

        socket.on('tool_result', (data) => {
            console.log('Tool result:', data.tool, data.result);
            updateLastToolBanner(data.result);
            // Reset currentAIBubble so next AI response creates new bubble
            currentAIBubble = null;
        });

        socket.on('tool_image', (data) => {
            console.log('🖼️ Tool image received:', data);
            // Finalize any existing AI bubble
            if (currentAIBubble) {
                finalizeAIBubble();
            }
            // Show image as popup immediately instead of adding to chat
            showImageModal(data.image_url, data.description);
            // Reset so next AI response creates new bubble
            currentAIBubble = null;
        });

        // Face Detection Indicator
        socket.on('face_detected', (data) => {
            console.log('👤 Face detected:', data);
            const indicator = document.getElementById('faceIndicator');
            const nameEl = document.getElementById('faceName');
            const confEl = document.getElementById('faceConf');

            if (data.name && data.confidence > 40) {
                nameEl.textContent = data.name;
                confEl.textContent = `(${data.confidence.toFixed(0)}%)`;
                indicator.style.display = 'flex';

                // Auto-hide setelah 30 detik (match backend cache TTL)
                clearTimeout(window._faceHideTimer);
                window._faceHideTimer = setTimeout(() => {
                    indicator.style.display = 'none';
                }, 30000);
            }
        });

        // Multi-Agent Status Handlers
        const agentBadge = document.getElementById('agentBadge');
        const agentName = document.getElementById('agentName');

        const agentNames = {
            'supervisor': 'Supervisor',
            'vision': 'Vision',
            'system': 'System',
            'memory': 'Memory',
            'planner': 'Planner'
        };

        function showAgentBadge(agentId) {
            agentName.textContent = agentNames[agentId] || agentId;
            agentBadge.classList.add('active');
        }

        function hideAgentBadge() {
            agentBadge.classList.remove('active');
        }

        function showAgentHandoff(from, to, reason) {
            const handoff = document.createElement('div');
            handoff.className = 'agent-handoff';
            handoff.innerHTML = `
                <div style="font-weight: 600; margin-bottom: 4px;">
                    ${agentNames[from] || from} → ${agentNames[to] || to}
                </div>
                <div style="font-size: 11px; opacity: 0.8;">${escapeHtml(reason)}</div>
            `;
            document.body.appendChild(handoff);

            setTimeout(() => {
                handoff.classList.add('fade-out');
                setTimeout(() => handoff.remove(), 300);
            }, 3000);
        }

        socket.on('agent_routing', (data) => {
            console.log('🎯 Routing to agent:', data);
            showAgentBadge('supervisor');
            showToast(`Routing to ${agentNames[data.agent] || data.agent}...`, 'info');
        });

        socket.on('agent_started', (data) => {
            console.log('▶️ Agent started:', data);
            showAgentBadge(data.agent);
        });

        socket.on('agent_completed', (data) => {
            console.log('✅ Agent completed:', data);
            setTimeout(() => hideAgentBadge(), 2000);
        });

        socket.on('agent_handoff', (data) => {
            console.log('🔄 Agent handoff:', data);
            showAgentHandoff(data.from, data.to, data.reason);
            showAgentBadge(data.to);
        });

        socket.on('ai_status', (data) => {
            if (data.status === 'completed' || data.status === 'error' || data.status === 'stopped') {
                setTimeout(() => hideAgentBadge(), 1000);
            }
        });

        let autoStopTimer = null;
        let currentStream = null;

        // Recording Functions - continuous mode with silence detection
        async function toggleRecording() {
            if (isAIResponding) return;

            // Unlock audio on first recording attempt (Brave requirement)
            unlockAudio();

            if (isRecording) {
                stopRecording();
            } else {
                stopAudioPlayback();  // Stop AI voice when user starts recording
                await startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });
                currentStream = stream;

                // Set up AudioContext for silence detection
                // Use default sample rate to match the microphone stream (avoid sample-rate mismatch error)
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 1024;
                analyser.smoothingTimeConstant = 0.3;
                source.connect(analyser);

                beginNewSegment();

                // Update UI
                isRecording = true;
                recordBtn.classList.add('recording');
                recordBtnIcon.innerHTML = '<svg class="icon" aria-hidden="true"><use href="#icon-stop-square"/></svg>';
                recordBtn.title = 'Stop Recording';
                listeningBar.classList.add('active');
                updateStatus('recording', 'Listening...');
                showToast('Continuous recording aktif — bicara kapan saja!', 'success');

                // Start silence detection loop
                speechDetected = false;
                monitorSilence();

            } catch (error) {
                console.error('Recording error:', error);
                showToast('Gagal akses microphone: ' + error.message, 'error');
            }
        }

        function beginNewSegment() {
            audioChunks = [];
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            mediaRecorder = new MediaRecorder(currentStream, {
                mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'
            });

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    audioChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                const duration = Date.now() - segmentStartTime;
                if (audioChunks.length === 0 || duration < MIN_SEGMENT_MS) {
                    console.log('Skip short segment, dur=' + duration + 'ms');
                    return;
                }
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                blob.arrayBuffer().then(buf => {
                    console.log('Sending audio segment, size=' + buf.byteLength + ' dur=' + duration + 'ms');
                    socket.emit('audio_data', buf);
                });
            };

            segmentStartTime = Date.now();
            mediaRecorder.start(50); // optimized: was 100ms
        }

        function finalizeSegment() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }

        function monitorSilence() {
            if (!isRecording) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            const check = () => {
                if (!isRecording) return;

                analyser.getByteTimeDomainData(dataArray);

                // Calculate RMS volume
                let sumSquares = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const normalized = (dataArray[i] - 128) / 128;
                    sumSquares += normalized * normalized;
                }
                const rms = Math.sqrt(sumSquares / bufferLength);
                const db = 20 * Math.log10(Math.max(rms, 1e-10));

                if (db > SILENCE_THRESHOLD) {
                    // Speech detected
                    if (!speechDetected) {
                        speechDetected = true;
                        updateStatus('recording', 'Mendengarkan...');
                        listeningBar.style.background = 'var(--gradient-2)';
                    }
                    if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
                } else if (speechDetected && !silenceTimer) {
                    // Was speaking, now silent — countdown to send
                    listeningBar.style.background = 'var(--gradient-1)';
                    updateStatus('recording', '⏳ Memproses...');
                    silenceTimer = setTimeout(() => {
                        if (!isRecording) return;
                        updateStatus('processing', 'Mengirim ke AI...');
                        // Stop current segment → onstop sends data → then begin new segment
                        finalizeSegment();
                        setTimeout(() => {
                            if (isRecording) {
                                beginNewSegment();
                                speechDetected = false;
                                updateStatus('recording', 'Listening...');
                                listeningBar.style.background = 'var(--gradient-1)';
                            }
                        }, 200);
                        silenceTimer = null;
                    }, SILENCE_DURATION);
                }

                requestAnimationFrame(check);
            };

            requestAnimationFrame(check);
        }

        function stopRecording() {
            if (!isRecording) return;

            isRecording = false;

            if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }

            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            mediaRecorder = null;

            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }

            if (audioContext) {
                audioContext.close().catch(() => {});
                audioContext = null;
            }
            analyser = null;

            // Update UI
            recordBtn.classList.remove('recording');
            recordBtnIcon.innerHTML = '<svg class="icon" aria-hidden="true"><use href="#icon-mic"/></svg>';
            recordBtn.title = 'Start Recording';
            listeningBar.classList.remove('active');
            listeningBar.style.background = 'var(--gradient-1)';
            updateStatus('connected', 'Ready');
        }

        // AI Communication
        function sendToAI(message) {
            stopAudioPlayback();  // Stop AI voice on manual text input
            hideImageModal();
            removeWelcome();
            socket.emit('send_message', {
                message: message,
                language: 'id-ID'
            });
        }

        // UI Functions
        function addUserMessage(text) {
            removeWelcome();
            currentAIBubble = null;

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.style.setProperty('--msg-index', messageCount++);
            msgDiv.innerHTML = `
                <div class="message-avatar"><svg class="icon" aria-hidden="true"><use href="#icon-user"/></svg></div>
                <div class="message-bubble">
                    <div class="message-label">You</div>
                    <div>${escapeHtml(text)}</div>
                    <div class="message-time">${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
                </div>
            `;
            insertBeforeTyping(msgDiv);
            scrollToBottom();
        }

        function createMessageBubble(sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.style.setProperty('--msg-index', messageCount++);
            msgDiv.innerHTML = `
                <div class="message-avatar">${sender === 'ai' ? '<svg class="icon" aria-hidden="true"><use href="#icon-bot"/></svg>' : '<svg class="icon" aria-hidden="true"><use href="#icon-user"/></svg>'}</div>
                <div class="message-bubble">
                    <div class="message-label">${sender === 'ai' ? 'AI Assistant' : 'You'}</div>
                    <div class="message-content"></div>
                    <div class="message-time">${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
                </div>
            `;
            insertBeforeTyping(msgDiv);
            scrollToBottom();
            const content = msgDiv.querySelector('.message-content');
            if (sender === 'ai' && isAIResponding) content.classList.add('typing-active');
            return content;
        }

                function appendToBubble(bubble, text) {
            bubble.dataset.rawText = (bubble.dataset.rawText || '') + text;

            // Check if marked is available
            if (typeof marked !== 'undefined') {
                bubble.classList.add('markdown-content');
                // Use marked to parse the raw text into HTML
                bubble.innerHTML = marked.parse(bubble.dataset.rawText);
            } else {
                bubble.textContent = bubble.dataset.rawText;
            }
        }

        function finalizeAIBubble() {
            currentAIBubble = null;
        }

        function insertBeforeTyping(element) {
            chatArea.insertBefore(element, typingIndicator);
        }

        let lastToolBanner = null;
        function addToolBanner(toolName, toolInput, result) {
            // Finalize any existing AI bubble first
            if (currentAIBubble) {
                finalizeAIBubble();
            }

            const banner = document.createElement('div');
            banner.className = 'tool-banner';
            banner.innerHTML = `
                <div class="tool-icon"><svg class="icon" aria-hidden="true"><use href="#icon-tool"/></svg></div>
                <div class="tool-info">
                    <div class="tool-name">
                        ${escapeHtml(toolName)}
                        <span class="tool-toggle">▼</span>
                    </div>
                    <div class="tool-detail">${escapeHtml(toolInput)}</div>
                    ${result ? `<div class="tool-result">${escapeHtml(result)}</div>` : ''}
                </div>
            `;

            // Add click handler to toggle collapse
            banner.addEventListener('click', function(e) {
                this.classList.toggle('collapsed');
            });

            insertBeforeTyping(banner);
            lastToolBanner = banner;
            scrollToBottom();
        }

        function updateLastToolBanner(result) {
            if (lastToolBanner) {
                const resultDiv = lastToolBanner.querySelector('.tool-result');
                if (resultDiv) {
                    resultDiv.textContent = result;
                } else {
                    const div = document.createElement('div');
                    div.className = 'tool-result';
                    div.textContent = result;
                    lastToolBanner.querySelector('.tool-info').appendChild(div);
                }

                // Add separator after tool result to visually separate from next AI response
                const separator = document.createElement('div');
                separator.className = 'tool-separator';
                insertBeforeTyping(separator);

                scrollToBottom();
            }
        }

        function showTyping(show) {
            if (show) {
                typingIndicator.classList.add('active');
            } else {
                typingIndicator.classList.remove('active');
            }
            scrollToBottom();
        }

        function removeWelcome() {
            if (welcomeScreen) {
                welcomeScreen.style.display = 'none';
            }
        }

        function showWelcome() {
            if (welcomeScreen) {
                welcomeScreen.style.display = 'flex';
            }
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function updateStatus(type, text) {
            statusBadge.className = 'status-badge';
            statusBadge.querySelector('span').textContent = text;

            if (type === 'recording') {
                statusBadge.classList.add('warning');
            } else if (type === 'error') {
                statusBadge.classList.add('error');
            } else if (type === 'processing' || type === 'thinking') {
                statusBadge.classList.add('warning');
            }
            // Default: connected/ready - no extra class
        }

        // Actions
        async function testConnection() {
            const originalStatus = statusBadge.querySelector('span').textContent;
            updateStatus('processing', 'Testing connection...');

            try {
                const response = await fetch('/api/test-connection', { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    showToast(data.message, 'success');
                    updateStatus('connected', 'AI Connected');
                } else {
                    showToast(data.message, 'error');
                    updateStatus('error', 'Connection Failed');
                }
            } catch (error) {
                showToast('Failed to test connection', 'error');
                updateStatus('error', 'Connection Error');
            }
        }

        function clearChat() {
            // Remove all messages except typing indicator and welcome
            const messages = chatArea.querySelectorAll('.message');
            messages.forEach(msg => msg.remove());

            socket.emit('clear_history');
            currentAIBubble = null;
            showWelcome();
            showToast('Chat cleared', 'success');
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(30px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        
        function showImageModal(imageUrl, description) {
            console.log('u{1F50D} Opening image modal:', imageUrl);
            let modal = document.getElementById('imageModal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'imageModal';
                modal.className = 'image-modal';
                modal.innerHTML = `
                    <div class="modal-drag-handle">
                        <button class="modal-close-btn"><svg class="icon" aria-hidden="true"><use href="#icon-close"/></svg></button>
                    </div>
                    <div class="modal-content">
                        <img src="" alt="Camera capture">
                        <div class="modal-description"></div>
                    </div>
                `;
                document.querySelector('.app-container').appendChild(modal);

                /* --- DRAG TO MOVE LOGIC --- */
                let isDragging = false;
                let startX, startY, startLeft, startTop;

                const onDragStart = (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    isDragging = true;
                    const rect = modal.getBoundingClientRect();
                    startX = e.clientX || (e.touches && e.touches[0].clientX);
                    startY = e.clientY || (e.touches && e.touches[0].clientY);
                    startLeft = rect.left;
                    startTop = rect.top;
                    modal.style.transform = 'none';
                    modal.style.left = startLeft + 'px';
                    modal.style.top = startTop + 'px';
                    e.preventDefault();
                };

                const onDragMove = (e) => {
                    if (!isDragging) return;
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    modal.style.left = (startLeft + (clientX - startX)) + 'px';
                    modal.style.top = (startTop + (clientY - startY)) + 'px';
                };

                const onDragEnd = () => { isDragging = false; };

                modal.addEventListener('mousedown', onDragStart);
                modal.addEventListener('touchstart', onDragStart, { passive: false });
                document.addEventListener('mousemove', onDragMove);
                document.addEventListener('touchmove', onDragMove, { passive: false });
                document.addEventListener('mouseup', onDragEnd);
                document.addEventListener('touchend', onDragEnd);

                /* Close button */
                const closeBtn = modal.querySelector('.modal-close-btn');
                closeBtn.onclick = () => { modal.classList.remove('active'); };
            }

            const img = modal.querySelector('img');
            const desc = modal.querySelector('.modal-description');

            img.src = imageUrl;
            if (description && desc) {
                desc.textContent = description;
                desc.style.display = 'block';
            } else if (desc) {
                desc.style.display = 'none';
            }

            // Reset to centered position
            modal.style.transform = 'translate(-50%, -50%)';
            modal.style.left = '50%';
            modal.style.top = '50%';

            modal.classList.add('active');
        }

        function hideImageModal() {
            const modal = document.getElementById('imageModal');
            if (modal) {
                modal.classList.remove('active');
            }
        }

        // TTS Functions
        function toggleTTS() {
            ttsEnabled = !ttsEnabled;
            const btn = document.getElementById('ttsBtn');
            if (ttsEnabled) {
                btn.innerHTML = '<svg class="icon" aria-hidden="true"><use href="#icon-volume"/></svg>';
                btn.classList.remove('disabled');
                btn.title = 'Audio Response ON';
                showToast('Audio response: ON', 'success');

                // Unlock audio immediately when enabling TTS
                unlockAudio();
            } else {
                btn.innerHTML = '<svg class="icon" aria-hidden="true"><use href="#icon-volume-mute"/></svg>';
                btn.classList.add('disabled');
                btn.title = 'Audio Response OFF';
                showToast('Audio response: OFF', 'warning');
                // Stop any ongoing speech
                stopAudioPlayback();
                ttsQueue = [];
            }
        }

        // Queue for TTS when audio not yet unlocked
        let ttsQueue = [];

        function flushTtsQueue() {
            if (audioUnlocked && ttsQueue.length > 0) {
                console.log('🎙️ Flushing', ttsQueue.length, 'queued TTS requests');
                const texts = ttsQueue.splice(0);
                texts.forEach(t => speakText(t));
            }
        }

        // Stop any currently playing TTS audio
        function stopAudioPlayback() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
            isSpeaking = false;
        }

        // Listen for TTS audio via Socket.IO (bypasses adblockers)
        socket.on('tts_audio', (data) => {
            if (!ttsEnabled) return;
            if (!data.base64) return;
            console.log('🎙️ TTS received via socket, size:', data.base64.length);

            // Stop any previous audio before starting new one
            stopAudioPlayback();

            const audioSrc = 'data:audio/mpeg;base64,' + data.base64;
            isSpeaking = true;
            updateStatus('speaking', 'AI sedang bicara...');
            currentAudio = new Audio(audioSrc);
            currentAudio.onplaying = () => console.log('🎙️ Audio playing');
            currentAudio.onended = () => {
                console.log('🎙️ Audio ended');
                isSpeaking = false;
                currentAudio = null;
                updateStatus('connected', 'Ready');
            };
            currentAudio.onerror = (e) => {
                console.error('🎙️ Audio error:', e, 'code:', currentAudio.error?.code, 'msg:', currentAudio.error?.message);
                isSpeaking = false;
                currentAudio = null;
                updateStatus('connected', 'Ready');
            };
            currentAudio.play().catch(e => {
                console.error('🎙️ Play rejected:', e);
                currentAudio = null;
                isSpeaking = false;
            });
        });

        socket.on('tts_error', (data) => {
            console.error('🎙️ TTS socket error:', data.error);
            isSpeaking = false;
        });

        function speakText(text) {
            if (!ttsEnabled || !text) return;

            // If audio not unlocked, queue and wait for user interaction
            if (!audioUnlocked) {
                console.log('🎙️ Audio locked — queueing TTS:', text.substring(0, 40));
                ttsQueue.push(text);
                showToast('Klik layar untuk mengaktifkan suara AI', 'warning');
                return;
            }

            console.log('🎙️ Requesting TTS via socket for:', text.substring(0, 60));
            socket.emit('request_tts', { text: text });
        }

        // Preload voices (critical for Chromium/Brave)
        if ('speechSynthesis' in window) {
            // Force initial load
            speechSynthesis.getVoices();

            // Listen for voices changed event (Chromium loads async)
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = () => {
                    const voices = speechSynthesis.getVoices();
                    console.log('Voices changed event:', voices.length, 'voices loaded');
                };
            }

            // Brave-specific: Force reload after delay
            setTimeout(() => {
                const voices = speechSynthesis.getVoices();
                console.log('Delayed voice check:', voices.length);
            }, 1000);
        } else {
            console.warn('SpeechSynthesis not supported in this browser');
        }

        // Thinking overlay functions
        function showThinkingOverlay(show) {
            if (show) {
                thinkingOverlay.classList.add('active');
                thinkingTextIdx = 0;
                thinkingText.textContent = thinkingTexts[0];
                thinkingTextTimer = setInterval(() => {
                    thinkingTextIdx = (thinkingTextIdx + 1) % thinkingTexts.length;
                    thinkingText.textContent = thinkingTexts[thinkingTextIdx];
                }, 3000);
            } else {
                thinkingOverlay.classList.remove('active');
                if (thinkingTextTimer) {
                    clearInterval(thinkingTextTimer);
                    thinkingTextTimer = null;
                }
            }
        }

        function stopGeneration() {
            socket.emit('stop_generation');
            showThinkingOverlay(false);
            showToast('Menghentikan respons...', 'warning');
        }

        // Keyboard shortcut: Escape to stop generation

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                toggleRecording();
            }
            if (e.code === 'Escape' && isAIResponding) {
                e.preventDefault();
                stopGeneration();
            }
        });

        // Register Service Worker (PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').then(() => {
                console.log('Service Worker registered');
            }).catch((e) => {
                console.log('Service Worker registration failed:', e);
            });
        }

        // Check browser support on load
        window.addEventListener('load', () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showToast('Browser tidak support audio recording. Gunakan Chrome/Firefox.', 'warning');
            }

            // Debug: Check SpeechSynthesis support
            if ('speechSynthesis' in window) {
                console.log('✅ SpeechSynthesis supported');
                // Force voice loading on page load
                setTimeout(() => {
                    const voices = speechSynthesis.getVoices();
                    console.log('📢 Initial voices loaded:', voices.length);
                    if (voices.length === 0) {
                        console.warn('⚠️ No voices loaded yet, waiting for onvoiceschanged event');
                    } else {
                        voices.forEach(v => console.log('  - Voice:', v.name, v.lang));
                    }
                }, 500);
            } else {
                console.error('❌ SpeechSynthesis not supported');
                showToast('Browser tidak support text-to-speech', 'warning');
            }

            // Detect Brave browser
            if (navigator.brave && navigator.brave.isBrave) {
                navigator.brave.isBrave().then(isBrave => {
                    if (isBrave) {
                        console.log('🦁 Brave browser detected - applying compatibility fixes');
                    }
                });
            }
        });
    </script>
</body>
