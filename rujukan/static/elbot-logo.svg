<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer ring rotation animation -->
    <animateTransform
      id="outerRotate"
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="0 100 100"
      to="360 100 100"
      dur="8s"
      repeatCount="indefinite"/>

    <!-- Inner ring rotation animation (counter) -->
    <animateTransform
      id="innerRotate"
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="360 100 100"
      to="0 100 100"
      dur="6s"
      repeatCount="indefinite"/>

    <!-- Pulse animation -->
    <animate
      id="pulse"
      attributeName="opacity"
      values="0.6;1;0.6"
      dur="2s"
      repeatCount="indefinite"/>
  </defs>

  <!-- Outer glow circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2" filter="url(#glow)"/>

  <!-- Outer rotating ring -->
  <g>
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="0 100 100"
      to="360 100 100"
      dur="8s"
      repeatCount="indefinite"/>

    <!-- Segments -->
    <path d="M 100 20 A 80 80 0 0 1 156.57 43.43" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.8"/>
    <path d="M 156.57 156.57 A 80 80 0 0 1 100 180" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.8"/>

    <!-- Small circles on ring -->
    <circle cx="100" cy="20" r="4" fill="#00ffff" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="156.57" cy="43.43" r="4" fill="#00ffff" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Middle ring -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>

  <!-- Inner rotating ring -->
  <g>
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="360 100 100"
      to="0 100 100"
      dur="6s"
      repeatCount="indefinite"/>

    <!-- Radial segments -->
    <line x1="100" y1="50" x2="100" y2="65" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
    <line x1="135.36" y1="64.64" x2="125.36" y2="74.64" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
    <line x1="150" y1="100" x2="135" y2="100" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
    <line x1="135.36" y1="135.36" x2="125.36" y2="125.36" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
    <line x1="100" y1="150" x2="100" y2="135" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
    <line x1="64.64" y1="135.36" x2="74.64" y2="125.36" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
    <line x1="50" y1="100" x2="65" y2="100" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
    <line x1="64.64" y1="64.64" x2="74.64" y2="74.64" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- Core circle -->
  <circle cx="100" cy="100" r="40" fill="#0a0e27" stroke="#00d4ff" stroke-width="3" filter="url(#glow)"/>

  <!-- Pulsing inner glow -->
  <circle cx="100" cy="100" r="35" fill="#00d4ff" opacity="0.3" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="35;38;35" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Center text: EB -->
  <text x="100" y="110" font-family="Orbitron, sans-serif" font-size="36" font-weight="bold"
        fill="#00ffff" text-anchor="middle" filter="url(#glow)">EB</text>

  <!-- Small center dot -->
  <circle cx="100" cy="100" r="3" fill="#00ffff" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
