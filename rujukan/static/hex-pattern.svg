<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="hexPattern" x="0" y="0" width="34.64" height="40" patternUnits="userSpaceOnUse">
      <!-- Single hexagon path -->
      <path d="M 17.32 0 L 34.64 10 L 34.64 30 L 17.32 40 L 0 30 L 0 10 Z"
            fill="none"
            stroke="#00d4ff"
            stroke-width="0.5"
            opacity="0.15"/>
    </pattern>

    <!-- Animated opacity for shimmer effect -->
    <animate
      id="shimmer"
      attributeName="opacity"
      values="0.1;0.2;0.1"
      dur="4s"
      repeatCount="indefinite"/>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0a0e27"/>

  <!-- Hexagonal pattern fill -->
  <rect width="200" height="200" fill="url(#hexPattern)">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
