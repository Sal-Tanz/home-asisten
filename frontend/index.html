<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElBot Home Asisten</title>

    <!-- Fonts: Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        primary: '#0891B2',
                        'primary-dark': '#0E7490',
                        'primary-light': '#22D3EE',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                        danger: '#EF4444',
                        success: '#10B981',
                        surface: '#FFFFFF',
                        'bg-main': '#F0F9FF',
                        'bg-accent': '#ECFEFF',
                        'text-main': '#164E63',
                        'text-muted': '#64748B',
                        'border-light': '#E2E8F0',
                    },
                    boxShadow: {
                        soft: '0 1px 3px 0 rgba(15,23,42,0.08), 0 1px 2px -1px rgba(15,23,42,0.06)',
                        float: '0 4px 12px -2px rgba(15,23,42,0.08), 0 2px 6px -2px rgba(15,23,42,0.05)',
                    },
                },
            },
        }
    </script>

    <!-- Design Tokens -->
    <link rel="stylesheet" href="/static/css/design-tokens.css">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-bg-main text-text-main font-sans antialiased min-h-screen">

    <!-- Header -->
    <header class="fixed top-0 inset-x-0 h-14 bg-surface/90 backdrop-blur-md border-b border-border-light shadow-soft z-50">
        <div class="max-w-3xl mx-auto px-4 h-full flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center shadow-[0_4px_12px_-2px_rgba(8,145,178,0.4)]">
                    <i data-lucide="bot" class="w-5 h-5 text-white"></i>
                </div>
                <span class="font-semibold text-text-main tracking-tight">ElBot</span>
            </div>

            <!-- Dynamic Island — pill morphing (idle / listening / thinking / speaking) -->
            <div id="voiceIndicator" class="dynamic-island is-idle">
                <div class="island-content">
                    <div id="waveformBars" class="island-wave island-hidden">
                        <div class="waveform-bar" data-bar="0"></div>
                        <div class="waveform-bar" data-bar="1"></div>
                        <div class="waveform-bar" data-bar="2"></div>
                        <div class="waveform-bar" data-bar="3"></div>
                        <div class="waveform-bar" data-bar="4"></div>
                    </div>
                    <div id="typingDots" class="island-dots island-hidden">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                    <p id="voiceStatus" class="island-status island-visible">ElBot</p>
                    <div id="islandIdle" class="island-idle-dot island-visible"></div>
                </div>
            </div>

            <!-- Status & Actions -->
            <div class="flex items-center gap-2">
                <div id="connectionStatus" class="flex items-center gap-1.5 px-2.5 py-1 bg-bg-accent border border-border-light rounded-full text-xs">
                    <span class="w-1.5 h-1.5 bg-primary rounded-full status-online"></span>
                    <span class="text-text-muted">Online</span>
                </div>
                <a href="/settings" class="btn-icon w-9 h-9 hover:bg-bg-accent text-text-muted hover:text-text-main" aria-label="Pengaturan">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content — full-height flex layout so the chat column scrolls on its own -->
    <main class="pt-14 pb-[76px] h-screen flex flex-col max-w-3xl mx-auto">

        <!-- Device Quick Status Panel -->
        <section class="flex-shrink-0 px-4 sm:px-6 lg:px-8 pt-4 pb-3">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-xs font-medium text-text-muted uppercase tracking-wider">Perangkat Aktif</h2>
                <span id="deviceCount" class="text-xs text-text-muted">0 perangkat</span>
            </div>
            <div id="devicePanel" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>
        </section>

        <!-- Chat Container — scrollable column -->
        <section class="flex-1 min-h-0 px-4 sm:px-6 lg:px-8 flex flex-col">
            <div id="chatContainer" class="flex-1 min-h-0 overflow-y-auto scroll-smooth space-y-4 py-2">
            </div>
        </section>
    </main>

    <!-- Input Area -->
    <div class="fixed bottom-0 inset-x-0 bg-surface/90 backdrop-blur-md border-t border-border-light shadow-float p-2 sm:p-3 z-40">
        <div class="max-w-3xl mx-auto">
            <div class="flex gap-2 items-end">
                <div class="flex-1 relative">
                    <textarea id="messageInput" rows="1"
                        placeholder="Ketik atau gunakan suara..."
                        class="w-full bg-bg-main border border-border-light rounded-xl px-3 py-2 sm:px-4 sm:py-2.5 text-sm text-text-main placeholder-text-muted focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 resize-none transition-all"
                        aria-label="Ketik pesan"></textarea>
                </div>
                <button id="micButton"
                    class="btn-icon flex-shrink-0 w-11 h-11 bg-bg-main hover:bg-bg-accent border border-border-light text-text-muted hover:text-primary"
                    aria-label="Mulai merekam">
                    <i data-lucide="mic" class="w-5 h-5 mic-icon"></i>
                </button>
                <button id="sendButton"
                    class="btn-icon flex-shrink-0 w-11 h-11 bg-primary hover:bg-primary-dark shadow-[0_4px_12px_-2px_rgba(8,145,178,0.45)]"
                    aria-label="Kirim">
                    <i data-lucide="send" class="w-5 h-5 text-white"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/app.js" type="module"></script>
</body>
</html>
