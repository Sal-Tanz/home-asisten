<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElBot Home Asisten</title>

    <!-- Fonts: Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        primary: '#3B82F6',
                        'primary-glow': '#60A5FA',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                        danger: '#EF4444',
                        surface: '#0A0F1E',
                        'surface-muted': '#111827',
                        'surface-raised': '#1E293B',
                    },
                },
            },
        }
    </script>

    <!-- Design Tokens -->
    <link rel="stylesheet" href="/static/css/design-tokens.css">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-surface text-slate-100 font-sans antialiased min-h-screen">

    <!-- Header -->
    <header class="fixed top-0 inset-x-0 h-14 bg-surface/95 backdrop-blur-sm border-b border-slate-800 z-50">
        <div class="max-w-6xl mx-auto px-4 h-full flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 bg-primary/20 rounded-lg flex items-center justify-center">
                    <i data-lucide="bot" class="w-5 h-5 text-primary"></i>
                </div>
                <span class="font-semibold text-sm">ElBot</span>
            </div>

            <!-- Status & Actions -->
            <div class="flex items-center gap-3">
                <div id="connectionStatus" class="flex items-center gap-1.5 px-2.5 py-1 bg-slate-800 rounded-lg text-xs">
                    <span class="w-1.5 h-1.5 bg-secondary rounded-full"></span>
                    <span class="text-slate-400">Online</span>
                </div>
                <a href="/settings" class="w-8 h-8 flex items-center justify-center hover:bg-slate-800 rounded-lg transition-colors" aria-label="Pengaturan">
                    <i data-lucide="settings" class="w-4 h-4 text-slate-400"></i>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-16 pb-24 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">

        <!-- Device Quick Status Panel -->
        <section class="mt-6 mb-8">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-xs font-medium text-slate-500 uppercase tracking-wider">Perangkat Aktif</h2>
                <span id="deviceCount" class="text-xs text-slate-500">0 perangkat</span>
            </div>
            <div id="devicePanel" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>
        </section>

        <!-- Chat Container -->
        <section class="mb-6">
            <div id="chatContainer" class="space-y-4 min-h-[400px] max-w-3xl mx-auto"></div>
        </section>

        <!-- Voice Indicator (4 States) -->
        <div id="voiceIndicator" class="hidden mb-6">
            <div class="flex items-center justify-center gap-2 py-2.5 px-4 bg-slate-800/80 backdrop-blur-sm border border-slate-700 rounded-full max-w-xs mx-auto">
                <div id="waveformBars" class="flex items-center gap-0.5">
                    <div class="waveform-bar w-0.5 bg-primary/60 rounded-full" data-bar="0"></div>
                    <div class="waveform-bar w-0.5 bg-primary/60 rounded-full" data-bar="1"></div>
                    <div class="waveform-bar w-0.5 bg-primary/60 rounded-full" data-bar="2"></div>
                    <div class="waveform-bar w-0.5 bg-primary/60 rounded-full" data-bar="3"></div>
                    <div class="waveform-bar w-0.5 bg-primary/60 rounded-full" data-bar="4"></div>
                </div>
                <div id="typingDots" class="hidden flex items-center gap-1">
                    <div class="typing-dot w-1.5 h-1.5 bg-accent rounded-full"></div>
                    <div class="typing-dot w-1.5 h-1.5 bg-accent rounded-full"></div>
                    <div class="typing-dot w-1.5 h-1.5 bg-accent rounded-full"></div>
                </div>
                <p class="text-xs text-slate-400 ml-1" id="voiceStatus">Mendengarkan...</p>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <div class="fixed bottom-0 inset-x-0 bg-surface/95 backdrop-blur-sm border-t border-slate-800 p-2 sm:p-3 z-40">
        <div class="max-w-3xl mx-auto">
            <div class="flex gap-2 items-end">
                <div class="flex-1 relative">
                    <textarea id="messageInput" rows="1"
                        placeholder="Ketik atau gunakan suara..."
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 sm:px-4 sm:py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 resize-none transition-all"
                        aria-label="Ketik pesan"></textarea>
                </div>
                <button id="micButton"
                    class="flex-shrink-0 w-11 h-11 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl flex items-center justify-center transition-colors group"
                    aria-label="Mikrofon">
                    <i data-lucide="mic" class="w-5 h-5 mic-icon text-slate-400 group-hover:text-slate-200 transition-colors"></i>
                </button>
                <button id="sendButton"
                    class="flex-shrink-0 w-11 h-11 bg-primary hover:bg-primary/90 rounded-xl flex items-center justify-center transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                    aria-label="Kirim">
                    <i data-lucide="send" class="w-5 h-5 text-white"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/app.js" type="module"></script>
</body>
</html>
